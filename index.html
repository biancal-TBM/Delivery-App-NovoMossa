function App() {

  const [view, setView]           = useState(0);
  const [showForm, setShowForm]   = useState(false);
  const [selDel, setSelDel]       = useState(null);
  const [notifs, setNotifs]       = useLS("nm_notifs_v3", []);
  const touchX = useRef(null);

  const addNotif = (to, msg) => setNotifs(p => [...p, NS.send(to, msg)]);

  const onTouchStart = e => touchX.current = e.touches[0].clientX;
  const onTouchEnd = e => {
    if (!touchX.current) return;
    const dx = e.changedTouches[0].clientX - touchX.current;
    const max = session?.role === ROLES.ADMIN ? 3 : 2;
    if (Math.abs(dx) > 55) { dx < 0 ? setView(v=>Math.min(v+1,max)) : setView(v=>Math.max(v-1,0)); }
    touchX.current = null;
  };

  if (!session) return React.createElement(Login, { users, onLogin:setSession });

  const isAdmin = session.role === ROLES.ADMIN;
  const TABS = [
    { l:"Livraisons", i:"list" }, { l:"Calendrier", i:"cal" }, { l:"Carte", i:"map" },
    ...(isAdmin ? [{ l:"Admin", i:"cog" }] : [])
  ];
  const pendingN = deliveries.filter(d => d.status === STATUS.AWAITING).length;

  const handleSave = form => {
    const id = `d${Date.now()}`;
    const driver = users.find(u => u.id === form.driverId);
    const d = { ...form, id, lat:18.50+Math.random()*0.06, lng:-72.40+Math.random()*0.14, createdBy:session.id, createdAt:new Date().toISOString(), updatedAt:new Date().toISOString() };
    setDeliveries(p => [...p, d]);
    if (!clients.find(c => c.name === form.clientName)) setClients(p => [...p, { name:form.clientName, phone:form.clientPhone, address:form.clientAddress }]);
    addNotif(form.clientPhone, NS.t.initial(d));
    if (form.deliveryDate === todayStr && driver) addNotif(driver.phone, NS.t.driver(d, driver.name));
    setShowForm(false);
  };

  const handleStatus = (id, newStatus, extra={}) => {
    const prev = deliveries.find(d => d.id===id);
    const upd = { ...prev, ...extra, status:newStatus, updatedAt:new Date().toISOString() };
    setDeliveries(ds => ds.map(d => d.id===id ? upd : d));
    const driver = users.find(u => u.id===upd.driverId);
    const salesRep = users.find(u => u.name===upd.salesRepName);
    if (newStatus === STATUS.DELIVERED) {
      addNotif(upd.clientPhone, NS.t.delivered(upd));
      if (salesRep) addNotif(salesRep.phone, `[Rep] Livraison confirmée : ${upd.clientName} — ${upd.invoiceNumber}`);
    }
    if (newStatus === STATUS.DELAYED) {
      addNotif(upd.clientPhone, NS.t.delayed(upd));
      if (salesRep) addNotif(salesRep.phone, `[Rep] Retard : ${upd.clientName} → ${upd.deliveryDate} ${upd.deliveryTimeRange}`);
    }
    if (newStatus === STATUS.APPROVED && driver) addNotif(driver.phone, NS.t.approved(upd, driver.name));
    if (newStatus === STATUS.REJECTED && driver) addNotif(driver.phone, NS.t.rejected(upd, driver.name));
  };

  const handleReschedule = (id, nd, nt, nr) => {
    const prev = deliveries.find(d => d.id===id);
    const upd = { ...prev, deliveryDate:nd, deliveryTime:nt, deliveryTimeRange:nr, updatedAt:new Date().toISOString() };
    setDeliveries(ds => ds.map(d => d.id===id ? upd : d));
    const driver = users.find(u => u.id===upd.driverId);
    const salesRep = users.find(u => u.name===upd.salesRepName);
    addNotif(upd.clientPhone, NS.t.delayed(upd));
    if (salesRep) addNotif(salesRep.phone, `[Rep] Reprogrammation : ${upd.clientName} → ${nd} ${nr}`);
    if (driver && nd === todayStr) addNotif(driver.phone, NS.t.driver(upd, driver.name));
  };

  return React.createElement('div', { style:{ minHeight:"100vh", background:"#f1f5f9" }, onTouchStart, onTouchEnd },

    // ── Top Bar ──
    React.createElement('div', { style:{ position:"sticky", top:0, zIndex:500, background:"#fff", borderBottom:"1px solid #f1f5f9", padding:"0 16px", display:"flex", alignItems:"center", justifyContent:"space-between", height:56, boxShadow:"0 1px 3px rgba(0,0,0,0.06)" } },
      React.createElement('div', { style:{ display:"flex", alignItems:"center", gap:10 } },
        React.createElement('div', { style:{ width:32, height:32, borderRadius:9, background:"linear-gradient(135deg,#1a56db,#3b82f6)", display:"flex", alignItems:"center", justifyContent:"center" } }, React.createElement(Icon, { n:"truck", s:17, c:"#fff" })),
        React.createElement('span', { style:{ fontWeight:900, fontSize:17, color:"#0f172a", letterSpacing:"-0.3px" } }, "NovoMossa")
      ),
      React.createElement('div', { style:{ display:"flex", alignItems:"center", gap:12 } },
        pendingN > 0 && React.createElement('div', { style:{ position:"relative", cursor:"pointer" }, onClick:()=>isAdmin&&setView(3) },
          React.createElement(Icon, { n:"bell", s:20, c:"#64748b" }),
          React.createElement('div', { style:{ position:"absolute", top:-6, right:-6, width:17, height:17, borderRadius:"50%", background:"#ef4444", color:"#fff", fontSize:9, display:"flex", alignItems:"center", justifyContent:"center", fontWeight:800 } }, pendingN)
        ),
        React.createElement('div', { style:{ display:"flex", alignItems:"center", gap:8 } },
          React.createElement('div', { style:{ width:30, height:30, borderRadius:"50%", background:"linear-gradient(135deg,#1a56db,#3b82f6)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, fontWeight:800, color:"#fff" } }, session.name.charAt(0)),
          React.createElement('span', { style:{ fontSize:12, color:"#64748b", maxWidth:90, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" } }, session.name)
        ),
        React.createElement('button', { onClick:()=>setSession(null), style:{ background:"none", border:"1px solid #e2e8f0", cursor:"pointer", padding:7, color:"#64748b", borderRadius:8, display:"flex" }, title:"Se déconnecter" }, React.createElement(Icon, { n:"out", s:16 }))
      )
    ),

    // ── Views ──
    view === 0 && React.createElement(ListView,   { deliveries, users, me:session, onNew:()=>setShowForm(true), onOpen:setSelDel }),
    view === 1 && React.createElement(CalView,    { deliveries, users, me:session, onOpen:setSelDel, onReschedule:handleReschedule }),
    view === 2 && React.createElement(MapView,    { deliveries, users, me:session }),
    view === 3 && isAdmin && React.createElement(AdminPanel, { users, setUsers, me:session, notifs }),

    // ── Bottom Nav ──
    React.createElement('div', { style:{ position:"fixed", bottom:0, left:0, right:0, zIndex:500, background:"#fff", borderTop:"1px solid #f1f5f9", display:"flex", height:64, boxShadow:"0 -2px 10px rgba(0,0,0,0.06)" } },
      TABS.map((tab, i) =>
        React.createElement('button', { key:tab.l, onClick:()=>setView(i), style:{ flex:1, background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:4, color:view===i?"#1a56db":"#94a3b8", transition:"color 0.15s", position:"relative" } },
          view === i && React.createElement('div', { style:{ position:"absolute", top:0, left:"25%", right:"25%", height:2, background:"#1a56db", borderRadius:"0 0 2px 2px" } }),
          React.createElement(Icon, { n:tab.i, s:21, c:view===i?"#1a56db":"#94a3b8" }),
          React.createElement('span', { style:{ fontSize:10, fontWeight:view===i?800:400 } }, tab.l)
        )
      )
    ),

    // ── FAB ──
    view === 0 && [ROLES.ADMIN, ROLES.STAFF, ROLES.DRIVER].includes(session.role) &&
      React.createElement('button', { onClick:()=>setShowForm(true), style:{ position:"fixed", bottom:80, right:20, width:54, height:54, borderRadius:"50%", background:"linear-gradient(135deg,#1a56db,#3b82f6)", border:"none", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 6px 24px rgba(26,86,219,0.45)", zIndex:400 } },
        React.createElement(Icon, { n:"plus", s:24, c:"#fff" })
      ),

    // ── Modals ──
    showForm && React.createElement(DelForm, { users, clients, onSave:handleSave, onClose:()=>setShowForm(false), me:session, editing:null }),
    selDel && React.createElement(DetailModal, {
      del:selDel, users, me:session,
      onClose:()=>setSelDel(null),
      onStatus:(id,s,e)=>{ handleStatus(id,s,e); setSelDel(null); }
    })
  );
}
